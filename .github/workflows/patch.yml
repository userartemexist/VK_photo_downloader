name: Apply Patches

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: 'If src/ >1 file, enter filename. Leave empty for auto-select'
        required: false
        default: ''

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq patch

      - name: Initialize log
        run: |
          echo "=== PATCH APPLICATION LOG ===" > patch_application.log
          echo "Date: $(date -u)" >> patch_application.log

      - name: Scan src/ for files
        id: scan
        run: |
          find src/ -type f 2>/dev/null | sort > src_files.txt || touch src_files.txt
          count=$(wc -l < src_files.txt)
          echo "file_count=$count" >> $GITHUB_OUTPUT
          
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No source files found in src/" >> patch_application.log
            exit 1
          fi
          
          echo "Available files in src/:" >> patch_application.log
          cat src_files.txt >> patch_application.log
          
          if [ "$count" -eq 1 ] && [ -z "${{ github.event.inputs.file_name }}" ]; then
            file_path=$(cat src_files.txt)
            file_name=$(basename "$file_path")
            echo "selected_file=$file_name" >> $GITHUB_OUTPUT
            echo "Auto-selected: $file_name" >> patch_application.log
          elif [ -n "${{ github.event.inputs.file_name }}" ]; then
            if [ ! -f "src/${{ github.event.inputs.file_name }}" ]; then
              echo "ERROR: File not found: src/${{ github.event.inputs.file_name }}" >> patch_application.log
              exit 1
            fi
            echo "selected_file=${{ github.event.inputs.file_name }}" >> $GITHUB_OUTPUT
            echo "Selected: ${{ github.event.inputs.file_name }}" >> patch_application.log
          else
            echo "ERROR: Multiple files in src/, please specify file_name:" >> patch_application.log
            exit 1
          fi

      - name: Extract file_id
        id: file_id
        run: |
          file_name="${{ steps.scan.outputs.selected_file }}"
          file_id="${file_name%.*}"
          echo "file_id=$file_id" >> $GITHUB_OUTPUT
          echo "File ID: $file_id" >> patch_application.log

      - name: Create folders
        run: |
          mkdir -p "patches/${{ steps.file_id.outputs.file_id }}"
          mkdir -p manifests

      - name: Load or create manifest
        run: |
          manifest_file="manifests/${{ steps.file_id.outputs.file_id }}.json"
          
          if [ -f "$manifest_file" ]; then
            echo "Manifest found: $manifest_file" >> patch_application.log
            jq -r '.appliedPatches[].filename' "$manifest_file" > applied_list.txt 2>/dev/null || touch applied_list.txt
          else
            echo "Creating new manifest" >> patch_application.log
            touch applied_list.txt
            echo '{"fileId":"${{ steps.file_id.outputs.file_id }}","fileName":"${{ steps.scan.outputs.selected_file }}","createdAt":"'"$(date -u)"'","lastUpdated":"'"$(date -u)"'","appliedPatches":[],"totalPatchesApplied":0,"currentVersion":"1.0.0"}' > "$manifest_file"
          fi

      - name: Find patches
        id: patches
        run: |
          patches_folder="patches/${{ steps.file_id.outputs.file_id }}"
          find "$patches_folder" -type f \( -name "*.patch" -o -name "*.txt" -o -name "*.diff" \) 2>/dev/null | sort > all_patches.txt || touch all_patches.txt
          total=$(wc -l < all_patches.txt)
          echo "total_patches=$total" >> $GITHUB_OUTPUT
          echo "Patches found: $total" >> patch_application.log

      - name: Apply patches
        id: apply
        run: |
          success_count=0
          skip_count=0
          fail_count=0
          patches_folder="patches/${{ steps.file_id.outputs.file_id }}"
          
          while IFS= read -r patch_file; do
            [ -z "$patch_file" ] && continue
            patch_name=$(basename "$patch_file")
            echo "--- $patch_name ---" >> patch_application.log
            
            if grep -qF "$patch_name" applied_list.txt 2>/dev/null; then
              echo "SKIPPED (already applied)" >> patch_application.log
              skip_count=$((skip_count + 1))
              continue
            fi
            
            fixed_patch="${patch_file}.fixed"
            sed 's/^\([^+ @-]\)/ \1/' "$patch_file" > "$fixed_patch"
            sed -i '/^[[:space:]]*$/d' "$fixed_patch"
            
            if patch -p1 -f --ignore-whitespace --no-backup-if-mismatch -d . < "$fixed_patch" >> patch_application.log 2>&1; then
              echo "SUCCESS" >> patch_application.log
              echo "$patch_name" >> applied_list.txt
              success_count=$((success_count + 1))
            else
              echo "FAILED" >> patch_application.log
              fail_count=$((fail_count + 1))
            fi
            
            rm -f "$fixed_patch"
            
          done < all_patches.txt
          
          echo "success_count=$success_count" >> $GITHUB_OUTPUT
          echo "skip_count=$skip_count" >> $GITHUB_OUTPUT
          echo "fail_count=$fail_count" >> $GITHUB_OUTPUT
          
          echo "=== LOG CONTENTS ==="
          cat patch_application.log
          
          if [ "$fail_count" -gt 0 ] && [ "$success_count" -eq 0 ]; then
            exit 1
          fi

      - name: Generate summary
        run: |
          echo "=== SUMMARY ===" >> patch_application.log
          echo "Total patches: ${{ steps.patches.outputs.total_patches }}" >> patch_application.log
          echo "Applied: ${{ steps.apply.outputs.success_count }}" >> patch_application.log
          echo "Skipped: ${{ steps.apply.outputs.skip_count }}" >> patch_application.log
          echo "Failed: ${{ steps.apply.outputs.fail_count }}" >> patch_application.log
          
          if [ "${{ steps.apply.outputs.fail_count }}" -gt 0 ]; then
            echo "WARNING: Some patches failed" >> patch_application.log
            exit 1
          else
            echo "All patches processed successfully" >> patch_application.log
          fi

      - name: Update manifest
        run: |
          manifest_file="manifests/${{ steps.file_id.outputs.file_id }}.json"
          total_applied=$(wc -l < applied_list.txt 2>/dev/null || echo 0)
          current_date=$(date -u)
          
          jq --arg date "$current_date" \
             --argjson total "$total_applied" \
             '.lastUpdated = $date | .totalPatchesApplied = $total' \
             "$manifest_file" > "$manifest_file.tmp"
          
          if [ -s applied_list.txt ]; then
            cat applied_list.txt | jq -R '.' | jq -s '.' > applied_json.tmp
            jq --arg date "$current_date" \
               --slurpfile applied applied_json.tmp \
               '.appliedPatches = ($applied[] | map({filename: ., appliedAt: $date}))' \
               "$manifest_file.tmp" > "$manifest_file"
            rm -f applied_json.tmp
          else
            mv "$manifest_file.tmp" "$manifest_file"
          fi
          
          rm -f "$manifest_file.tmp"

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/ patch_application.log manifests/ 2>/dev/null || true
          git commit -m "Apply patches $(date -u)" || echo "No changes to commit"
          git push

      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: patch-application-log
          path: patch_application.log
          retention-days: 30
