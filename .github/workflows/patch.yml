name: Apply Patches
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq patch

      - name: Initialize log
        run: |
          echo "=== PATCH APPLICATION LOG ===" > patch_application.log
          echo "Date: $(date -u)" >> patch_application.log
          cat patch_application.log

      - name: Scan src/ for files
        id: scan
        run: |
          find src/ -type f 2>/dev/null | sort > src_files.txt || touch src_files.txt
          count=$(wc -l < src_files.txt)
          echo "file_count=$count" >> $GITHUB_OUTPUT
          
          echo "Files in src/:" >> patch_application.log
          cat src_files.txt >> patch_application.log
          cat patch_application.log

      - name: Scan patches
        id: patches
        run: |
          find patches/ -type f \( -name "*.patch" -o -name "*.txt" -o -name "*.diff" \) 2>/dev/null | sort > all_patches.txt || touch all_patches.txt
          total=$(wc -l < all_patches.txt)
          echo "total_patches=$total" >> $GITHUB_OUTPUT
          echo "Patches found: $total" >> patch_application.log
          cat patch_application.log

      - name: Apply patches
        id: apply
        run: |
          success_count=0
          skip_count=0
          fail_count=0
          not_found_count=0
          
          echo "" >> patch_application.log
          echo "=== APPLYING PATCHES ===" >> patch_application.log
          
          while IFS= read -r patch_file; do
            [ -z "$patch_file" ] && continue
            patch_name=$(basename "$patch_file")
            
            # Извлекаем путь из заголовка патча
            header_path=$(head -1 "$patch_file" | sed 's/^--- a\///' | sed 's/^--- //' | head -1 | tr -d '\r' | xargs)
            
            echo "" >> patch_application.log
            echo "--- $patch_name ---" >> patch_application.log
            echo "Header path: $header_path" >> patch_application.log
            
            # Определяем, где лежит файл и в какой директории применять патч
            patch_dir="."
            target_path="$header_path"
            
            if [ -f "$header_path" ]; then
              patch_dir="."
              target_path="$header_path"
            elif [ -f "src/$header_path" ]; then
              patch_dir="src"
              target_path="src/$header_path"
              echo "⚠ Auto-fix: applying with -d src" >> patch_application.log
            elif [ -f "src/${header_path#*/}" ]; then
              # Если в заголовке уже есть src/, но файл в src/
              patch_dir="src"
              target_path="src/${header_path#*/}"
              echo "⚠ Auto-fix: stripped duplicate src/" >> patch_application.log
            else
              echo "⚠ SKIP: File not found: $header_path or src/$header_path" >> patch_application.log
              not_found_count=$((not_found_count + 1))
              continue
            fi
            
            file_id=$(basename "$target_path")
            file_id="${file_id%.*}"
            
            manifest_file="manifests/${file_id}.json"
            mkdir -p manifests
            
            if [ -f "$manifest_file" ]; then
              jq -r '.appliedPatches[].filename // empty' "$manifest_file" > applied_list.txt 2>/dev/null || touch applied_list.txt
            else
              touch applied_list.txt
              echo "{\"fileId\":\"$file_id\",\"fileName\":\"$target_path\",\"createdAt\":\"$(date -u)\",\"lastUpdated\":\"$(date -u)\",\"appliedPatches\":[],\"totalPatchesApplied\":0}" | jq --indent 2 '.' > "$manifest_file"
            fi
            
            if grep -qF "$patch_name" applied_list.txt 2>/dev/null; then
              echo "⚠ SKIP: Already applied" >> patch_application.log
              skip_count=$((skip_count + 1))
              continue
            fi
            
            # Применяем патч с правильным -d
            if [ "$patch_dir" = "src" ]; then
              patch_cmd="patch -p1 -d src -f --ignore-whitespace < \"$patch_file\""
            else
              patch_cmd="patch -p1 -f --ignore-whitespace < \"$patch_file\""
            fi
            
            echo "Running: $patch_cmd" >> patch_application.log
            
            if eval "$patch_cmd" >> patch_application.log 2>&1; then
              echo "✓ SUCCESS" >> patch_application.log
              echo "$patch_name" >> applied_list.txt
              success_count=$((success_count + 1))
            else
              echo "✗ FAILED" >> patch_application.log
              echo "Error details:" >> patch_application.log
              tail -30 "$patch_file" >> patch_application.log
              fail_count=$((fail_count + 1))
            fi
            
          done < all_patches.txt
          
          echo "success_count=$success_count" >> $GITHUB_OUTPUT
          echo "skip_count=$skip_count" >> $GITHUB_OUTPUT
          echo "fail_count=$fail_count" >> $GITHUB_OUTPUT
          echo "not_found_count=$not_found_count" >> $GITHUB_OUTPUT
          
          cat patch_application.log

      - name: Generate summary
        run: |
          echo "" >> patch_application.log
          echo "=== SUMMARY ===" >> patch_application.log
          echo "Total patches: ${{ steps.patches.outputs.total_patches }}" >> patch_application.log
          echo "Applied: ${{ steps.apply.outputs.success_count }}" >> patch_application.log
          echo "Skipped (already applied): ${{ steps.apply.outputs.skip_count }}" >> patch_application.log
          echo "Skipped (file not found): ${{ steps.apply.outputs.not_found_count }}" >> patch_application.log
          echo "Failed: ${{ steps.apply.outputs.fail_count }}" >> patch_application.log
          
          echo ""
          echo "=========================================="
          echo "           PATCH APPLY SUMMARY            "
          echo "=========================================="
          echo "Total:   ${{ steps.patches.outputs.total_patches }}"
          echo "Applied: ${{ steps.apply.outputs.success_count }}"
          echo "Skipped: ${{ steps.apply.outputs.skip_count }} (manifest) + ${{ steps.apply.outputs.not_found_count }} (not found)"
          echo "Failed:  ${{ steps.apply.outputs.fail_count }}"
          echo "=========================================="
          echo ""
          
          if [ "${{ steps.apply.outputs.fail_count }}" -gt 0 ]; then
            echo "❌ Some patches failed. Check log for details."
          else
            echo "✅ All patches processed successfully!"
          fi
          
          cat patch_application.log

      - name: Update manifests
        run: |
          for manifest_file in manifests/*.json; do
            [ -f "$manifest_file" ] || continue
            
            file_id=$(basename "$manifest_file" .json)
            applied_list="manifests/${file_id}_applied.txt"
            
            if [ -f "$applied_list" ] && [ -s "$applied_list" ]; then
              total_applied=$(wc -l < "$applied_list")
              current_date=$(date -u)
              
              jq --indent 2 --arg date "$current_date" \
                 --argjson total "$total_applied" \
                 '.lastUpdated = $date | .totalPatchesApplied = $total' \
                 "$manifest_file" > "$manifest_file.tmp"
              
              cat "$applied_list" | jq --indent 2 -R '.' | jq --indent 2 -s '.' > applied_json.tmp
              jq --indent 2 --arg date "$current_date" \
                 --slurpfile applied applied_json.tmp \
                 '.appliedPatches = ($applied[] | map({filename: ., appliedAt: $date}))' \
                 "$manifest_file.tmp" > "$manifest_file"
              
              rm -f "$manifest_file.tmp" applied_json.tmp
            fi
            
            rm -f "$applied_list"
          done
          cat patch_application.log

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/ patch_application.log manifests/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Apply patches $(date -u)"
          git push || true

      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: patch-application-log-${{ github.run_id }}
          path: patch_application.log
          retention-days: 30
          if-no-files-found: warn

      - name: Fail if patches failed
        if: steps.apply.outputs.fail_count > 0
        run: exit 1
